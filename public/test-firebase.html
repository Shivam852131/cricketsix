<!DOCTYPE html>
<html>
<head>
    <title>Firebase Test</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQkuUYyoBH1M6RnmaMhehWG7xInO2SvRw",
            authDomain: "cricketsix26.firebaseapp.com",
            databaseURL: "https://cricketsix26-default-rtdb.firebaseio.com",
            projectId: "cricketsix26",
            storageBucket: "cricketsix26.firebasestorage.app",
            messagingSenderId: "429796170500",
            appId: "1:429796170500:web:d9d1b7d2a4b920bb18ce51",
            measurementId: "G-RDZ9WBVBXG"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        // Test writing data
        db.ref('test/timestamp').set({
            value: Date.now(),
            message: 'Firebase is working!'
        }).then(() => {
            console.log('✓ Firebase write successful');
            document.body.innerHTML += '<p style="color:green">✓ Firebase write successful</p>';
        }).catch(err => {
            console.error('✗ Firebase write failed:', err);
            document.body.innerHTML += '<p style="color:red">✗ Firebase write failed: ' + err.message + '</p>';
        });
        
        // Test reading data
        db.ref('test/timestamp').once('value').then(snapshot => {
            const data = snapshot.val();
            console.log('✓ Firebase read successful:', data);
            document.body.innerHTML += '<p style="color:green">✓ Firebase read successful: ' + JSON.stringify(data) + '</p>';
        }).catch(err => {
            console.error('✗ Firebase read failed:', err);
            document.body.innerHTML += '<p style="color:red">✗ Firebase read failed: ' + err.message + '</p>';
        });
    </script>
</head>
<body>
    <h1>Firebase Connection Test</h1>
    <p>Check browser console for results.</p>
</body>
</html>
